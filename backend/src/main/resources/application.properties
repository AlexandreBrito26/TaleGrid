# ============================================================
# TaleGrid — application.properties
# Todas as propriedades sensíveis lidas de variáveis de ambiente.
# Configure-as no painel do Railway / Render antes do deploy.
# ============================================================

spring.application.name=talegrid
server.port=${PORT:8080}

# --- PostgreSQL ---
# Railway injeta DATABASE_URL automaticamente.
# Se usar Neon.tech, cole a connection string aqui.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/talegrid}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- JWT ---
talegrid.jwt.secret=${JWT_SECRET:TROQUE_POR_64_BYTES_BASE64_openssl_rand_-base64_64}
talegrid.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# --- Upload de PDF ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# --- Gemini IA ---
talegrid.gemini.api-key=${GEMINI_API_KEY:}
talegrid.gemini.max-images-per-chapter=3
talegrid.gemini.daily-limit=100
talegrid.gemini.image-storage-dir=${IMAGE_STORAGE_DIR:uploads/images/}

# --- CORS: URL do seu front-end no Vercel ---
talegrid.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# --- Logs ---
logging.level.com.talegrid=${LOG_LEVEL:INFO}
